<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trendy Style</title>
<link rel="icon" href="banner.png">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:wght@600&family=Great+Vibes&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{background:#f8f8f8;overflow-x:hidden}

/* HEADER */
header{
  background:#fdf1f3;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 30px;
  position:sticky;
  top:0;
}

header h2{
  font-family:'Great Vibes',cursive;
  font-size:28px;
  display:flex;
  align-items:center;
  gap:10px;
}

header h2 img{
  width:40px;
}

/* NAV */
nav{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
}

nav a{
  margin:8px;
  text-decoration:none;
  color:#333;
  font-weight:600;
}

/* SECCIONES */
section{display:none;padding:20px}
#inicio{display:block}

/* BANNER */
.banner{
  overflow:hidden;
}

.slider{
  display:flex;
  overflow-x:auto;
  gap:10px;
}

.slider img{
  width:100%;
  max-width:250px;
  border-radius:10px;
}

/* TEXTO */
.inicio-texto{text-align:center;margin-top:20px}
.inicio-texto h1{font-size:24px}
.inicio-texto p{font-size:14px}

/* DESTACADOS */
.destacados{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
  gap:10px;
  margin-top:20px;
}

.card{
  background:#f5efe6;
  padding:15px;
  border-radius:10px;
  text-align:center;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
  gap:10px;
}

/* PRODUCTO */
.producto{
  background:white;
  padding:10px;
  border-radius:10px;
  text-align:center;
}

.producto img{
  width:100%;
  height:150px;
  object-fit:contain;
}

/* BOTONES */
button{
  margin-top:10px;
  padding:10px;
  width:100%;
  background:black;
  color:white;
  border:none;
  border-radius:8px;
}

/* INPUTS */
input, textarea, select{
  width:100%;
  margin-top:10px;
  padding:10px;
  border-radius:8px;
  border:1px solid #ccc;
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:white;
  padding:20px;
  border-radius:10px;
  width:90%;
  max-width:300px;
}

.modal img{
  width:100%;
}

/* FOOTER */
footer{
  background:black;
  color:white;
  text-align:center;
  padding:15px;
}

/* RESPONSIVE */
@media(max-width:768px){
  header{
    flex-direction:column;
  }
}
</style>
</head>

<body>

<header>
<h2><img src="logo.png">Trendy Style</h2>
<nav>
<a onclick="mostrar('inicio')">Inicio</a>
<a onclick="mostrar('productos')">Productos</a>
<a onclick="mostrar('carrito')">Carrito (<span id="contador">0</span>)</a>
<a onclick="mostrar('nosotros')">Nosotros</a>
<a onclick="mostrar('contacto')">Contacto</a>
</nav>
</header>

<section id="inicio">
<div class="banner">
<div class="slider">
<img src="b1.jpeg"><img src="b2.jpeg"><img src="b3.jpeg"><img src="b4.jpeg">
</div>
</div>

<div class="inicio-texto">
<h1>Viste con elegancia y confianza</h1>
<p>Descubre las últimas tendencias</p>
</div>

<div class="destacados">
<div class="card" onclick="mostrar('productos')">🔥 Comprar</div>
<div class="card" onclick="mostrar('productos')">👗 Mujer</div>
<div class="card" onclick="mostrar('productos')">👕 Hombre</div>
<div class="card" onclick="mostrar('contacto')">📲 Contacto</div>
</div>
</section>

<section id="productos">
<h2>Productos</h2>
<div class="grid" id="mujer"></div>
</section>

<section id="carrito">
<h2>Carrito</h2>
<div id="lista"></div>
<h3 id="total"></h3>

<select>
<option>Efectivo</option>
<option>Transferencia</option>
</select>

<input placeholder="Nombre">
<input placeholder="Dirección">
<input placeholder="Teléfono">

<button>Comprar</button>
</section>

<section id="nosotros">
<h2>Nosotros</h2>
<p>Somos una tienda moderna de moda.</p>
</section>

<section id="contacto">
<h2>Contacto</h2>
<input placeholder="Nombre">
<input placeholder="Correo">
<textarea placeholder="Mensaje"></textarea>
<button>Enviar</button>
</section>

<footer>
<p>© 2026 Trendy Style</p>
</footer>

<script>
function mostrar(s){
document.querySelectorAll('section').forEach(x=>x.style.display='none');
document.getElementById(s).style.display='block';
}
</script>

</body>
</html>
